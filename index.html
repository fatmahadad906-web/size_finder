<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المقاس المناسب</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1e2d4a;
    --navy-dark: #152035;
    --navy-mid: #243556;
    --sky: #a8cbf0;
    --sky-light: #c8dff5;
    --sky-pale: #e8f2fb;
    --white: #ffffff;
    --text-main: #1e2d4a;
    --text-muted: #5a7ca0;
    --radius: 18px;
    --radius-lg: 28px;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    min-height: 100vh;
    font-family: 'Cairo', sans-serif;
    background: var(--navy-dark);
    color: var(--white);
    direction: rtl;
    text-align: right;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .logo-wrap {
    margin-bottom: 32px;
    display: flex;
    justify-content: center;
  }

  .logo-placeholder {
    width: 120px;
    height: 64px;
    background: var(--navy-mid);
    border: 2px dashed rgba(168,203,240,0.35);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sky);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .logo-img {
    max-height: 72px;
    max-width: 180px;
    object-fit: contain;
  }

  .card {
    background: var(--navy-mid);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(168,203,240,0.18);
    padding: 40px 36px;
    width: 100%;
    max-width: 460px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -60px;
    left: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(168,203,240,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .step {
    display: none;
    animation: fadeSlide 0.4s ease forwards;
  }

  .step.active {
    display: block;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(168,203,240,0.12);
    border: 1px solid rgba(168,203,240,0.25);
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--sky);
    font-weight: 600;
    margin-bottom: 20px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--sky);
  }

  h1 {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 900;
    color: var(--sky-light);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 15px;
    color: rgba(168,203,240,0.7);
    margin-bottom: 28px;
    font-weight: 400;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 28px;
  }

  .unit-label {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--sky);
    font-weight: 600;
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(168,203,240,0.25);
    border-radius: var(--radius);
    padding: 16px 20px 16px 56px;
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    direction: rtl;
    text-align: right;
    transition: border-color var(--transition), background var(--transition);
    -moz-appearance: textfield;
    outline: none;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--sky);
    background: rgba(168,203,240,0.08);
  }

  input[type="number"]::placeholder {
    color: rgba(168,203,240,0.35);
    font-weight: 400;
    font-size: 16px;
  }

  .btn-primary {
    width: 100%;
    background: var(--sky);
    color: var(--navy-dark);
    border: none;
    border-radius: var(--radius);
    padding: 16px 24px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
  }

  .btn-primary:hover { background: var(--sky-light); }
  .btn-primary:active { transform: scale(0.97); }

  .choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }

  .choice-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(168,203,240,0.2);
    border-radius: var(--radius);
    padding: 20px 16px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    color: rgba(168,203,240,0.8);
    cursor: pointer;
    transition: all var(--transition);
    text-align: center;
  }

  .choice-btn:hover {
    border-color: var(--sky);
    color: var(--sky-light);
    background: rgba(168,203,240,0.08);
  }

  .choice-btn.selected {
    background: rgba(168,203,240,0.15);
    border-color: var(--sky);
    color: var(--white);
  }

  .result-card {
    text-align: center;
    padding: 8px 0 4px;
  }

  .result-label {
    font-size: 16px;
    color: rgba(168,203,240,0.7);
    margin-bottom: 16px;
    font-weight: 400;
  }

  .size-display {
    font-size: clamp(72px, 22vw, 110px);
    font-weight: 900;
    color: var(--sky-light);
    line-height: 1;
    margin-bottom: 16px;
    letter-spacing: -2px;
  }

  .size-display.special {
    font-size: clamp(22px, 5vw, 30px);
    letter-spacing: 0;
    line-height: 1.5;
    color: var(--sky);
    background: rgba(168,203,240,0.08);
    border-radius: var(--radius);
    padding: 24px 20px;
  }

  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .pdot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(168,203,240,0.2);
    transition: background var(--transition), transform var(--transition);
  }

  .pdot.active {
    background: var(--sky);
    transform: scale(1.25);
  }

  .pdot.done {
    background: rgba(168,203,240,0.5);
  }

  .error-msg {
    display: none;
    color: #f0a0a0;
    font-size: 14px;
    margin-top: -20px;
    margin-bottom: 16px;
    font-weight: 600;
    padding-right: 4px;
  }

  .error-msg.show { display: block; }

  @media (max-width: 500px) {
    .card { padding: 28px 20px; }
  }
</style>
</head>

  <div class="logo-placeholder" style="display:none;">الشعار هنا</div>
</div>

<div class="progress-dots">
  <div class="pdot active" id="pd1"></div>
  <div class="pdot" id="pd2"></div>
  <div class="pdot" id="pd3"></div>
  <div class="pdot" id="pd4"></div>
</div>

<div class="card">

  <!-- Step 1: Weight -->
  <div class="step active" id="step1">
    <div class="step-badge"><div class="dot"></div> خطوة ١ من ٣</div>
    <h1>هساعدك تختار المقاس المناسب</h1>
    <p class="subtitle">اكتب وزنك من غير ما تحور</p>
    <div class="input-wrap">
      <input type="number" id="weightInput" placeholder="مثلاً ٧٥" min="1" max="300">
      <span class="unit-label">كجم</span>
    </div>
    <div class="error-msg" id="weightErr">ادخل وزنك الأول</div>
    <button class="btn-primary" onclick="goStep2()">ال بعده ←</button>
  </div>

  <!-- Step 2: Height -->
  <div class="step" id="step2">
    <div class="step-badge"><div class="dot"></div> خطوة ٢ من ٣</div>
    <h1>طولك كام</h1>
    <div class="input-wrap">
      <input type="number" id="heightInput" placeholder="مثلاً ١٧٥" min="1" max="250">
      <span class="unit-label">سم</span>
    </div>
    <div class="error-msg" id="heightErr">ادخل طولك الأول</div>
    <button class="btn-primary" onclick="goStep3()">اخر حاجة ←</button>
  </div>

  <!-- Step 3: Preference -->
  <div class="step" id="step3">
    <div class="step-badge"><div class="dot"></div> خطوة ٣ من ٣</div>
    <h1>رز بلبن ولا كريم كراميل</h1>
    <div class="choice-grid">
      <button class="choice-btn" id="choice1" onclick="selectChoice(this)">رز بلبن</button>
      <button class="choice-btn" id="choice2" onclick="selectChoice(this)">كريم كراميل</button>
    </div>
    <div class="error-msg" id="choiceErr">اختار واحدة الأول</div>
    <button class="btn-primary" onclick="showResult()">قول المقاس كام ←</button>
  </div>

  <!-- Step 4: Result -->
  <div class="step" id="step4">
    <div class="result-card">
      <p class="result-label">مقاسك المناسب هو</p>
      <div id="sizeOutput" class="size-display"></div>
      <button class="btn-primary" style="margin-top: 32px;" onclick="restart()">↺ ابدأ من جديد</button>
    </div>
  </div>

</div>

<script>
  let selectedChoice = null;

  function setProgress(step) {
    for (let i = 1; i <= 4; i++) {
      const dot = document.getElementById('pd' + i);
      dot.classList.remove('active', 'done');
      if (i < step) dot.classList.add('done');
      else if (i === step) dot.classList.add('active');
    }
  }

  function switchStep(from, to) {
    const fromEl = document.getElementById('step' + from);
    const toEl = document.getElementById('step' + to);
    fromEl.classList.remove('active');
    setTimeout(() => {
      toEl.classList.add('active');
      setProgress(to);
    }, 10);
  }

  function goStep2() {
    const w = document.getElementById('weightInput').value;
    const err = document.getElementById('weightErr');
    if (!w || w <= 0) { err.classList.add('show'); return; }
    err.classList.remove('show');
    switchStep(1, 2);
  }

  function goStep3() {
    const h = document.getElementById('heightInput').value;
    const err = document.getElementById('heightErr');
    if (!h || h <= 0) { err.classList.add('show'); return; }
    err.classList.remove('show');
    switchStep(2, 3);
  }

  function selectChoice(btn) {
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedChoice = btn.textContent;
    document.getElementById('choiceErr').classList.remove('show');
  }

  function calcSize(weight) {
    if (weight < 65) return 'SMALL';
    if (weight <= 80) return 'M';
    if (weight <= 95) return 'L';
    if (weight <= 105) return 'XL';
    if (weight <= 115) return '2XL';
    return 'BIG';
  }

  function showResult() {
    if (!selectedChoice) {
      document.getElementById('choiceErr').classList.add('show');
      return;
    }
    const weight = parseFloat(document.getElementById('weightInput').value);
    const size = calcSize(weight);
    const output = document.getElementById('sizeOutput');

    output.classList.remove('special');

    if (size === 'SMALL') {
      output.classList.add('special');
      output.textContent = 'مفيش مقاسات سنافر والله 😅';
    } else if (size === 'BIG') {
      output.classList.add('special');
      output.textContent = 'اول م ننزل مقاسات قوم عاد هنكلمك حاضر 🙈';
    } else {
      output.textContent = size;
    }

    switchStep(3, 4);
  }

  function restart() {
    document.getElementById('weightInput').value = '';
    document.getElementById('heightInput').value = '';
    selectedChoice = null;
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
    document.getElementById('step4').classList.remove('active');
    setTimeout(() => {
      document.getElementById('step1').classList.add('active');
      setProgress(1);
    }, 10);
  }

  document.getElementById('weightInput').addEventListener('keydown', e => { if (e.key === 'Enter') goStep2(); });
  document.getElementById('heightInput').addEventListener('keydown', e => { if (e.key === 'Enter') goStep3(); });
</script>
</body>
</html>
